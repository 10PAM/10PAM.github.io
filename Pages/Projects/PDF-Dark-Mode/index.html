<div ondragover="handleDragOver(event) ondrop="handleDrop(event)" style="font-family: Arial, sans-serif; text-align: center; background-color: #000000; color: white; padding: 20px; margin: 0; width: 100%; height: 100%;">
    <h1>PDF Dark Mode Converter</h1>
    <div class="controls" style="display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 20px;">
        <label onchange="handleFileInputChange(event)" for="fileInput" onclick="handleFileUploadClick()" class="custom-file-upload" style="display: inline-block; padding: 10px 15px; background-color: #0056d2; color: #ffffff; border-radius: 5px; cursor: pointer; font-size: 16px; margin-bottom: 0; line-height: 1.2; border: 1px solid #0056d2;">Choose PDF File</label>
        <label class="sr-only" for="themeSelector" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;">Theme</label>
        <select onchange="changeTheme()" id="themeSelector" class="theme-selector" style="padding: 10px 15px; background-color: #2a2a2a; color: white; border: 1px solid #444; border-radius: 5px; font-size: 16px; cursor: pointer;">
            <option value="classic" selected>Classic Inversion</option>
            <option value="claude">Claude Warm</option>
            <option value="chatgpt">ChatGPT Cool</option>
            <option value="sepia">Sepia Dark</option>
            <option value="midnight">Midnight Blue</option>
            <option value="forest">Forest Green</option>
        </select>
    </div>
    <input type="file" id="fileInput" class="file-input" style="display: none;" accept="application/pdf">
    <div id="progressContainer" aria-live="polite" style="width: 80%; max-width: 400px; background-color: #222; display: none; padding: 10px; border-radius: 5px; margin: 20px auto; text-align: center;">
        <div id="progressBar" style="height: 20px; background-color: #0056d2; width: 0; text-align: center; line-height: 20px; color: #ffffff; border-radius: 5px; transition: width 0.3s ease-in-out;"></div>
        <div id="progressText" style="margin-top: 5px; color: white; font-weight: bold;">0/0</div>
    </div>
    <button id="downloadBtn" onclick="triggerDownload()" style="margin-top: 20px; padding: 10px 20px; background-color: #0056d2; color: #ffffff; border: none; cursor: pointer; display: none; position: relative; left: 50%; transform: translateX(-50%); font-size: 16px; border-radius: 5px;">Download failed? Click here</button>
    <div id="pdfContainer" style="width: 70%; margin: 0 auto;"></div>
</div>

<div ondragover="handleDragOver(event)" ondrop="handleDrop(event)" style="font-family: Arial, sans-serif; text-align: center; color: white; padding: 5%; margin: 0%;">
    <h1 style="font-size: 1.8vw;">PDF Dark Mode Converter</h1>
    <div class="controls" style="display: flex; justify-content: center; align-items: center; gap: 2%; flex-wrap: wrap; margin-bottom: 3%;">
        <label onchange="handleFileInputChange(event)" for="fileInput" onclick="handleFileUploadClick()" class="custom-file-upload" style="cursor: pointer; padding-right: 0%; color: #ffffff; outline: none; background-color: rgba(119, 20, 20, 0); border-width: 0.5%; border-style: solid; border-color: #ffffff; text-align: center; position: relative; width: 24%; height: 20%; display: inline-block; padding: 3% 6%; font-size: 1.8vw; margin-bottom: 0; line-height: 1.2;">Choose PDF File</label>
        <label class="sr-only" for="themeSelector" style="padding-right: 0%; color: #ffffff; outline: none; background-color: rgba(119, 20, 20, 0); border-color: #ffffff; border-radius: 1%; text-align: center; position: relative; position: absolute; width: 24%; height: 20%; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;">Theme</label>
        <select onchange="changeTheme()" id="themeSelector" class="theme-selector" style="color: #ffffff; outline: none; background-color: rgba(119, 20, 20, 0); border-color: #ffffff; border-radius: 1%; padding: 3% 6%; font-size: 1.8vw; cursor: pointer;">
            <option style="color: #ffffff; background-color: #000000;" value="classic" selected>Theme: Classic Inversion</option>
            <option style="color: #ffffff; background-color: #000000;" value="claude">Theme: Claude Warm</option>
            <option style="color: #ffffff; background-color: #000000;" value="chatgpt">Theme:ChatGPT Cool</option>
            <option style="color: #ffffff; background-color: #000000;" value="sepia">Theme:Sepia Dark</option>
            <option style="color: #ffffff; background-color: #000000;" value="midnight">Theme:Midnight Blue</option>
            <option style="color: #ffffff; background-color: #000000;" value="forest">Theme:Forest Green</option>
        </select>
    </div>
    <input onchange="handleFileInputChange(event)" type="file" id="fileInput" class="file-input" style="display: none;" accept="application/pdf">
    <div id="progressContainer" aria-live="polite" style="width: 80%; background-color: #222; display: none; padding: 2%; border-radius: 5px; margin: 20px auto; text-align: center;">
        <div id="progressBar" style="height: 5%; background-color: #0056d2; width: 0; text-align: center; line-height: 20px; color: #ffffff; border-radius: 5px; transition: width 0.3s ease-in-out;"></div>
        <div id="progressText" style="margin-top: 2%; color: white; font-weight: bold;">0/0</div>
    </div>
    <button id="downloadBtn" onclick="triggerDownload()" style="cursor: pointer; padding-right: 0%; color: #ffffff; outline: none; background-color: rgba(119, 20, 20, 0); border-color: #ffffff; border-radius: 1%; text-align: center; position: relative; text-align: center; width: 24%; height: 20%; margin: 3% auto 0 auto; margin-top: 3%; display: none; font-size: 1.8vw;">Download</button>
    <div id="pdfContainer" style="width: 70%; margin: 0 auto;"></div>
</div>

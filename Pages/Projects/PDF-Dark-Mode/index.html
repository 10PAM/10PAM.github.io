<div ondragover="handleDragOver(event) ondrop="handleDrop(event)" style="font-family: Arial, sans-serif; text-align: center; color: white; padding: 5%; margin: 0%;">
    <h1>PDF Dark Mode Converter</h1>
    <div class="controls" style="display: flex; justify-content: center; align-items: center; gap: 2%; flex-wrap: wrap; margin-bottom: 3%;">
        <label onchange="handleFileInputChange(event)" for="fileInput" onclick="handleFileUploadClick()" class="custom-file-upload" style="display: inline-block; padding: 3% 6%; background-color: #0056d2; color: #ffffff; border-radius: 5px; cursor: pointer; font-size: 1.8vw; margin-bottom: 0; line-height: 1.2; border: 1px solid #0056d2;">Choose PDF File</label>
        <label class="sr-only" for="themeSelector" style="position: absolute; width: 2%; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;">Theme</label>
        <select onchange="changeTheme()" id="themeSelector" class="theme-selector" style="padding: 3% 6%; background-color: #2a2a2a; color: white; border: 1px solid #444; border-radius: 5px; font-size: 1.8vw; cursor: pointer;">
            <option value="classic" selected>Theme: Classic Inversion</option>
            <option value="claude">Theme: Claude Warm</option>
            <option value="chatgpt">Theme:ChatGPT Cool</option>
            <option value="sepia">Theme:Sepia Dark</option>
            <option value="midnight">Theme:Midnight Blue</option>
            <option value="forest">Theme:Forest Green</option>
        </select>
    </div>
    <input onchange="handleFileInputChange(event)" type="file" id="fileInput" class="file-input" style="display: none;" accept="application/pdf">
    <div id="progressContainer" aria-live="polite" style="width: 80%; max-width: 20%; background-color: #222; display: none; padding: 2%; border-radius: 5px; margin: 20px auto; text-align: center;">
        <div id="progressBar" style="height: 5%; background-color: #0056d2; width: 0; text-align: center; line-height: 20px; color: #ffffff; border-radius: 5px; transition: width 0.3s ease-in-out;"></div>
        <div id="progressText" style="margin-top: 2%; color: white; font-weight: bold;">0/0</div>
    </div>
    <button id="downloadBtn" onclick="triggerDownload()" style="margin-top: 20px; padding: 6% 9%; background-color: #0056d2; color: #ffffff; border: none; cursor: pointer; display: none; position: relative; left: 50%; transform: translateX(-50%); font-size: 1.8vw; border-radius: 5px;">Download</button>
    <div id="pdfContainer" style="width: 70%; margin: 0 auto;"></div>
</div>
